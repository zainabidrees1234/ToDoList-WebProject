<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Banner -->
    <header class="hero-section">
        <div class="overlay">
            <h1 class="main-title">Todo App</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-5">

        <!-- Filter Buttons -->
        <div class="filter-wrapper text-center mb-5">
            <div class="btn-group custom-filter-group" role="group">
                <button class="btn filter-btn active-filter" id="todayBtn">Today</button>
                <button class="btn filter-btn" id="pendingBtn">Pending</button>
                <button class="btn filter-btn" id="overdueBtn">Overdue</button>
            </div>
        </div>

        <!-- Tasks Heading + Add Button -->
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
            <h2 class="section-title mb-0">Tasks</h2>
            <button class="btn add-task-btn" id="addTaskBtn">
                <i class="bi bi-plus-circle me-2"></i>Add Task
            </button>
        </div>

        <!-- Active Tasks List -->
        <div id="taskList"></div>

        <!-- Completed Section -->
        <div class="completed-section mt-4">
            <h3 class="completed-heading" id="toggleCompleted">
                Completed <span id="completedArrow">▲</span>
            </h3>
            <div id="completedList" class="mt-3"></div>
        </div>
    </main>

    <!-- Add/Edit Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content custom-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label for="taskName" class="form-label">Task Name</label>
                            <input type="text" class="form-control" id="taskName" placeholder="Enter task name" required>
                        </div>

                        <div class="mb-3">
                            <label for="taskDate" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="taskDate" required>
                        </div>

                        <div class="mb-3">
                            <label for="taskPriority" class="form-label">Priority</label>
                            <select class="form-select" id="taskPriority" required>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>

                        <button type="submit" class="btn save-btn w-100">Save Task</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
